name = "enertrack-web"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# ── D1 Database ────────────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "enertrack-db"
database_id   = "f597dd59-b602-4188-acf2-37b822eb5048"

# ── KV Namespace ──────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding    = "SESSIONS"
id         = "fdc84081c06842a18f8bd4995de3a598"
preview_id = "fdc84081c06842a18f8bd4995de3a598"

# ── Secrets ───────────────────────────────────────────────────────────────────
# wrangler secret put JWT_SECRET

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
